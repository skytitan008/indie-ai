<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="128" cy="128" r="120" fill="url(#grad1)"/>
  
  <!-- AI 大脑符号 -->
  <circle cx="128" cy="100" r="35" fill="white" opacity="0.9"/>
  <circle cx="95" cy="160" r="25" fill="white" opacity="0.9"/>
  <circle cx="161" cy="160" r="25" fill="white" opacity="0.9"/>
  
  <!-- 连接线 -->
  <line x1="128" y1="135" x2="95" y2="135" stroke="white" stroke-width="8" opacity="0.9" stroke-linecap="round"/>
  <line x1="128" y1="135" x2="161" y2="135" stroke="white" stroke-width="8" opacity="0.9" stroke-linecap="round"/>
  
  <!-- 闪光点 -->
  <circle cx="128" cy="100" r="10" fill="#667eea"/>
  <circle cx="95" cy="160" r="8" fill="#667eea"/>
  <circle cx="161" cy="160" r="8" fill="#667eea"/>
</svg>
