<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独立 AI MVP - 学习曲线可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 1em;
            opacity: 0.9;
        }
        
        .chart-container {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        
        .chart-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .chart-wrapper {
            position: relative;
            height: 400px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.6);
        }
        
        button.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .file-upload {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px dashed #667eea;
        }
        
        .file-upload input[type="file"] {
            display: none;
        }
        
        .file-upload label {
            cursor: pointer;
            color: #667eea;
            font-weight: bold;
        }
        
        .file-name {
            color: #666;
            font-size: 0.9em;
        }
        
        .log-section {
            background: #2d3748;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .log-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .log-content {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            background: #1a202c;
            padding: 15px;
            border-radius: 8px;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-success { color: #48bb78; }
        .log-error { color: #f56565; }
        .log-info { color: #4299e1; }
        .log-warning { color: #ecc94b; }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 独立 AI MVP</h1>
            <div class="subtitle">学习曲线可视化 - Learning Curve Visualization</div>
        </header>
        
        <div class="controls">
            <div class="file-upload">
                <input type="file" id="dataFile" accept=".json">
                <label for="dataFile">📁 选择数据文件</label>
                <span class="file-name" id="fileName">未选择文件</span>
            </div>
            
            <button onclick="loadDefaultData()">加载默认数据</button>
            <button onclick="refreshData()">🔄 刷新数据</button>
            <button onclick="exportImage()">📷 导出图表</button>
            <button onclick="toggleDarkMode()">🌙 切换主题</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalRuns">-</div>
                <div class="stat-label">总轮次</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgReward">-</div>
                <div class="stat-label">平均奖励</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="finalQSize">-</div>
                <div class="stat-label">最终 Q 表大小</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalUpdates">-</div>
                <div class="stat-label">总学习更新</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">📈 学习曲线 - Learning Progress</div>
            <div class="chart-wrapper">
                <canvas id="learningChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">🧠 Q 表增长 - Q-Table Growth</div>
            <div class="chart-wrapper">
                <canvas id="qTableChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">✅ 成功率 - Success Rate</div>
            <div class="chart-wrapper">
                <canvas id="successChart"></canvas>
            </div>
        </div>
        
        <div class="log-section">
            <div class="log-title">📋 实验日志</div>
            <div class="log-content" id="logContent">
                <div class="log-entry log-info">等待数据加载...</div>
            </div>
        </div>
        
        <footer>
            <p>独立 AI MVP - 不依赖大模型的独立思考系统</p>
            <p>© 2026 小七 & 老王</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
